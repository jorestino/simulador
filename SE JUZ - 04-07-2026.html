<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SEP Simulator — SE JUAZEIRO JUZ</title>
<style>
:root{
  --bg:#0f5778;--panel:#093447;--panel2:#0c4a64;--border:#1d6a8a;--fg:#ffffff;--muted:#c8d8e0;
  --closed:#ff2020;--open:#20ff20;--energ:#ffff03;--ground:#ff8c00;--block:#ff40c0;--bus:#dbdbdb;--line:#c8d8e0;
  --primary:#00fcfc;
  --aInfo:#5ab8ff;--aWarn:#ffd23f;--aCrit:#ff5a3c;--aEmer:#ff1530;
  --kv-500:#ff0000;--kv-230:#00ccff;--kv-138:#000000;--kv-69:#009c00;--kv-34:#9966ff;--kv-13:#ffff03;
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font-size:12px;overflow:hidden}
.app{display:grid;grid-template-rows:36px 1fr 200px;grid-template-columns:1fr 280px;height:100vh}
header{grid-column:1/3;background:var(--panel2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 10px;font-weight:600;color:var(--primary);font-family:"Times New Roman",serif;font-style:italic}
header .name{color:var(--primary)}
header button{background:var(--panel);color:var(--fg);border:1px solid var(--border);border-radius:3px;padding:4px 10px;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;cursor:pointer;font-style:normal}
header button:hover{background:var(--panel2)}
.diagram{position:relative;background:var(--bg);background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:20px 20px;overflow:hidden}
.side{background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.bottom{grid-column:1/3;background:var(--panel);border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;overflow:hidden}
.col{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.hd{background:var(--panel2);border-bottom:1px solid var(--border);padding:5px 10px;text-transform:uppercase;font-size:10px;color:var(--fg);letter-spacing:.08em;display:flex;justify-content:space-between;align-items:center;font-weight:700}
.list{overflow:auto;flex:1;font-size:11px}
.row{display:flex;gap:6px;padding:3px 6px;border-bottom:1px solid #0a3a50}
.pill{display:inline-block;padding:0 4px;border-radius:2px;font-size:9px;font-weight:bold;color:#000}
.menu{position:absolute;background:var(--panel2);border:1px solid var(--border);border-radius:3px;padding:4px;z-index:10;box-shadow:0 6px 20px rgba(0,0,0,.5)}
.menu button{display:block;width:100%;text-align:left;background:none;border:none;color:var(--fg);padding:4px 10px;cursor:pointer;font-family:inherit;font-size:11px}
.menu button:hover{background:var(--panel)}
.menu .title{padding:4px 10px;color:var(--muted);border-bottom:1px solid var(--border);margin-bottom:3px}
.blink{animation:bl .8s steps(2,start) infinite}@keyframes bl{50%{opacity:.25}}
.blink-attn{animation:ba .7s ease-in-out infinite}@keyframes ba{0%,100%{opacity:1}50%{opacity:.15}}
text{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;fill:var(--fg)}
.footer{padding:4px 8px;background:var(--panel2);font-size:10px;color:var(--muted);border-top:1px solid var(--border)}
.seqbox{position:absolute;top:8px;right:8px;background:var(--panel2);border:1px solid var(--primary);border-radius:4px;padding:8px;z-index:5;font-size:11px;min-width:180px}
.zbar{position:absolute;top:8px;left:8px;background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:4px;z-index:6;display:flex;gap:4px;align-items:center;font-size:11px;flex-wrap:wrap;max-width:calc(100% - 16px)}
.zbar button{background:var(--panel);color:var(--fg);border:1px solid var(--border);border-radius:3px;padding:3px 8px;cursor:pointer;font-family:inherit;font-size:11px}
.zbar button:hover{background:var(--bg)}
.zbar select{background:var(--panel);color:var(--fg);border:1px solid var(--border);border-radius:3px;padding:3px;font-family:inherit;font-size:11px}
.diagram svg{cursor:grab}
.diagram svg.dragging{cursor:grabbing}
</style>
</head>
<body>
<div class="app">
  <header>
    <span>SEP SIMULATOR · <span class="name" id="sname"></span></span>
    <span style="flex:1"></span>
    <button onclick="resetSim()">Reset</button>
    <button onclick="ackAll()">Reconhecer todos</button>
    <button onclick="downloadJSON()">Exportar JSON</button>
  </header>
  <div class="diagram">
    <svg id="svg" width="100%" height="100%"></svg>
    <div class="zbar">
      <button onclick="zoom(0.8)" title="Zoom +">＋</button>
      <button onclick="zoom(1.25)" title="Zoom −">−</button>
      <button onclick="zoomReset()" title="Ajustar tudo">100%</button>
      <span id="zsec"></span>
    </div>
    <div class="seqbox" id="seqbox" style="display:none"></div>
    <div class="footer">Clique em um equipamento para operar · vermelho=fechado · verde=aberto · amarelo=energizado</div>
  </div>
  <div class="side">
    <div class="hd"><span>Alarmes</span><span id="acount"></span></div>
    <div class="list" id="alarms"></div>
  </div>
  <div class="bottom">
    <div class="col">
      <div class="hd">Eventos & Logs</div>
      <div class="list" id="events"></div>
    </div>
    <div class="col" style="border-right:none">
      <div class="hd">Proteções (instrutor)</div>
      <div class="list" id="prot" style="padding:6px;display:grid;grid-template-columns:repeat(3,1fr);gap:4px;align-content:start"></div>
    </div>
  </div>
</div>

<script>
(function(){
  const COLORS={INFO:"var(--aInfo)",WARNING:"var(--aWarn)",CRITICAL:"var(--aCrit)",EMERGENCY:"var(--aEmer)"};
  const PLABEL={INFO:"INFORMAÇÃO",WARNING:"ALERTA",CRITICAL:"CRÍTICO",EMERGENCY:"EMERGÊNCIA"};
  // HTML-escape any user-controlled string before injecting into innerHTML / attributes.
  function esc(v){return String(v==null?"":v).replace(/[&<>"']/g,function(c){return({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]})}
  // Restrict background image to http(s) or data:image URLs.
  function safeUrl(u){if(typeof u!=="string")return"";const s=u.trim();if(/^https?:\/\//i.test(s))return s;if(/^data:image\/(png|jpe?g|gif|webp|svg\+xml);base64,/i.test(s))return s;return""}
  let S=JSON.parse(document.getElementById("state").textContent);
  if(!S.alarms)S.alarms=[];if(!S.events)S.events=[];if(!S.protections)S.protections=[];

  const SW=new Set(["breaker","disconnector","ground_switch","bus_coupler"]);

  function conducts(e){if(e.blocked)return false;if(e.state==="GROUNDED")return false;if(e.type==="ground_switch")return false;if(SW.has(e.type))return e.state==="CLOSED";return true}
  function compute(){
    const adj={};Object.keys(S.equipment).forEach(id=>adj[id]=[]);
    Object.values(S.connections).forEach(c=>{if(adj[c.from]&&adj[c.to]){adj[c.from].push(c.to);adj[c.to].push(c.from)}});
    const grounded=new Set();
    for(const e of Object.values(S.equipment)){
      if(e.type==="ground_switch"&&e.state==="CLOSED"&&!e.blocked){
        const q=[e.id],sn=new Set([e.id]);
        while(q.length){const c=q.shift();grounded.add(c);for(const n of adj[c]||[]){if(sn.has(n))continue;const ne=S.equipment[n];if(!ne)continue;if(c===e.id||conducts(ne)){sn.add(n);q.push(n)}}}
      }
    }
    const en=new Set(),vof={};
    for(const e of Object.values(S.equipment)){
      if(e.isSource&&!e.blocked&&e.state!=="GROUNDED"){
        const v=e.sourceVoltage||e.voltageNominal;
        const q=[e.id],sn=new Set([e.id]);
        while(q.length){const c=q.shift();if(grounded.has(c))continue;en.add(c);vof[c]=Math.max(vof[c]||0,v);
          for(const n of adj[c]||[]){if(sn.has(n))continue;const ne=S.equipment[n];if(!ne)continue;if(grounded.has(n))continue;if(c===e.id||conducts(ne)){sn.add(n);q.push(n)}}}
      }
    }
    const out={};for(const[id,e]of Object.entries(S.equipment))out[id]={...e,energized:en.has(id),voltageNow:en.has(id)?vof[id]||e.voltageNominal:0};
    return out;
  }

  function vColor(kv){if(!kv)return "var(--bus)";if(kv>=500)return "var(--kv-500)";if(kv>=230)return "var(--kv-230)";if(kv>=115)return "var(--kv-138)";if(kv>=69)return "var(--kv-69)";if(kv>=34)return "var(--kv-34)";if(kv>=11)return "var(--kv-13)";return "var(--bus)"}
  function sym(e,live){
    const st=e.state==="CLOSED"?"var(--closed)":e.state==="GROUNDED"?"var(--ground)":e.state==="BLOCKED"?"var(--block)":"var(--open)";
    const LOCK=new Set(["breaker","disconnector","ground_switch","bus_coupler","transformer","autotransformer"]);
    const stk=LOCK.has(e.type)?st:(e.color||st);
    const er=live.energized?'<circle r="2.5" fill="var(--energ)"/>':'';
    const vlab=live.energized?`<text x="6" y="-14" font-family="Courier New,monospace" font-weight="700" font-size="10" fill="#20ff20">${(Math.round((live.voltageNow||0)*10)/10).toFixed(1)} kV</text>`:'';
    if(e.type==="bus"){const w=e.width||200;const bc=e.color||vColor(e.voltageNominal);const lc=bc==="var(--kv-138)"||bc==="#000000"?"#ffffff":bc;const vNow=Math.round((live.voltageNow||0)*10)/10;return `${live.energized?`<rect x="-2" y="-6" width="${w+4}" height="12" fill="var(--energ)" opacity="0.4"/>`:""}<rect x="0" y="-3" width="${w}" height="6" fill="${bc}" stroke="#ffffff" stroke-width="0.5"/><text x="${w/2}" y="-9" text-anchor="middle" font-weight="700" font-size="11" fill="#ffffff">${esc(e.name)} <tspan fill="${lc}">${esc(e.voltageNominal)}kV</tspan></text>${live.energized?`<text x="${w-2}" y="16" text-anchor="end" font-family="Courier New,monospace" font-weight="700" font-size="10" fill="#20ff20">${vNow.toFixed(1)} kV</text>`:""}`}
    if(e.type==="node")return `<circle r="4" fill="${e.color||(live.energized?'var(--energ)':'var(--line)')}" stroke="var(--fg)" stroke-width="0.5"/><text x="8" y="3" font-size="8" fill="var(--muted)">${esc(e.name)}</text>`;
    if(e.type==="breaker"){const cl=e.state==="CLOSED";return `<line x1="0" y1="-18" x2="0" y2="-10" stroke="${st}" stroke-width="1.5"/><line x1="0" y1="10" x2="0" y2="18" stroke="${st}" stroke-width="1.5"/><rect x="-8" y="-10" width="16" height="20" fill="${cl?st:"var(--bg)"}" stroke="${st}" stroke-width="1.8"/>${cl?`<line x1="-6" y1="-8" x2="6" y2="8" stroke="#ffffff" stroke-width="1.5"/>`:""}${er}<text x="14" y="4" font-size="9">${esc(e.name)}</text>`}
    if(e.type==="disconnector")return `<line x1="0" y1="-18" x2="0" y2="-8" stroke="${st}" stroke-width="1.5"/><line x1="0" y1="8" x2="0" y2="18" stroke="${st}" stroke-width="1.5"/>${e.state==="CLOSED"?`<line x1="0" y1="-8" x2="0" y2="8" stroke="${st}" stroke-width="2"/>`:`<line x1="0" y1="-8" x2="8" y2="8" stroke="${st}" stroke-width="2"/>`}${er}<text x="12" y="4" font-size="9">${esc(e.name)}</text>`;
    if(e.type==="ground_switch")return `<line x1="0" y1="-18" x2="0" y2="0" stroke="${st}" stroke-width="1.5"/>${e.state==="CLOSED"?`<line x1="0" y1="0" x2="0" y2="10" stroke="${st}" stroke-width="2"/>`:`<line x1="0" y1="0" x2="8" y2="10" stroke="${st}" stroke-width="2"/>`}<line x1="-8" y1="12" x2="8" y2="12" stroke="var(--ground)" stroke-width="2"/><line x1="-5" y1="15" x2="5" y2="15" stroke="var(--ground)"/><text x="12" y="4" font-size="9">${esc(e.name)}</text>`;
    if(e.type==="transformer"||e.type==="autotransformer")return `<line x1="0" y1="-22" x2="0" y2="-8" stroke="${st}" stroke-width="1.5"/><line x1="0" y1="8" x2="0" y2="22" stroke="${st}" stroke-width="1.5"/><circle cx="0" cy="-4" r="8" fill="none" stroke="${st}" stroke-width="1.5"/><circle cx="0" cy="4" r="8" fill="none" stroke="${st}" stroke-width="1.5"/>${er}<text x="14" y="2" font-size="9">${esc(e.name)}</text>`;
    if(e.type==="line")return `<line x1="0" y1="-20" x2="0" y2="20" stroke="${stk}" stroke-width="2" stroke-dasharray="2 3"/><polygon points="-4,-20 4,-20 0,-26" fill="${stk}"/>${er}<text x="6" y="0" font-size="9">${esc(e.name)}</text>${vlab}`;
    if(e.type==="generator")return `<line x1="0" y1="-20" x2="0" y2="-10" stroke="${stk}" stroke-width="1.5"/><circle cx="0" cy="0" r="10" fill="var(--bg)" stroke="${stk}" stroke-width="1.8"/><text x="0" y="4" text-anchor="middle" font-size="10" fill="${stk}">G</text>${er}<text x="14" y="4" font-size="9">${esc(e.name)}</text>`;
    if(e.type==="load")return `<line x1="0" y1="-20" x2="0" y2="-6" stroke="${stk}" stroke-width="1.5"/><polygon points="-8,-6 8,-6 0,12" fill="none" stroke="${stk}" stroke-width="1.5"/><text x="14" y="4" font-size="9">${esc(e.name)}</text>`;
    if(e.type==="capacitor")return `<line x1="0" y1="-20" x2="0" y2="-4" stroke="${stk}" stroke-width="1.5"/><line x1="-8" y1="-4" x2="8" y2="-4" stroke="${stk}" stroke-width="2"/><line x1="-8" y1="4" x2="8" y2="4" stroke="${stk}" stroke-width="2"/><line x1="0" y1="4" x2="0" y2="20" stroke="${stk}" stroke-width="1.5"/>${er}<text x="12" y="4" font-size="9">${esc(e.name)}</text>`;
    if(e.type==="reactor")return `<line x1="0" y1="-20" x2="0" y2="-10" stroke="${stk}" stroke-width="1.5"/><rect x="-6" y="-10" width="12" height="20" fill="none" stroke="${stk}"/><line x1="0" y1="10" x2="0" y2="20" stroke="${stk}" stroke-width="1.5"/>${er}<text x="12" y="4" font-size="9">${esc(e.name)}</text>`;
    if(e.type==="bus_coupler")return `<line x1="-20" y1="0" x2="-8" y2="0" stroke="${st}" stroke-width="1.5"/><line x1="8" y1="0" x2="20" y2="0" stroke="${st}" stroke-width="1.5"/><rect x="-8" y="-8" width="16" height="16" fill="var(--bg)" stroke="${st}" stroke-width="1.8"/>${e.state==="CLOSED"?`<line x1="-6" y1="-6" x2="6" y2="6" stroke="${st}" stroke-width="1.5"/>`:""}${er}<text x="0" y="-12" text-anchor="middle" font-size="9">${esc(e.name)}</text>`;

  }

  function anchor(e){return{x:e.x+(e.type==="bus"?(e.width||200)/2:0),y:e.y}}

  let VB=null; // {x,y,w,h} or null = auto-fit
  function autoBounds(){
    const eqs=Object.values(S.equipment);
    let minX=0,minY=0,maxX=800,maxY=600;
    if(eqs.length){minX=Math.min(...eqs.map(e=>e.x))-40;minY=Math.min(...eqs.map(e=>e.y))-40;maxX=Math.max(...eqs.map(e=>e.x+(e.width||40)))+40;maxY=Math.max(...eqs.map(e=>e.y+40))+40}
    return{x:minX,y:minY,w:maxX-minX,h:maxY-minY};
  }
  function render(){
    document.getElementById("sname").textContent=S.substationName||"";
    const live=compute();
    const eqs=Object.values(S.equipment);
    const ab=autoBounds();
    const vb=VB||ab;
    const minX=vb.x,minY=vb.y,maxX=vb.x+vb.w,maxY=vb.y+vb.h;
    let html=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="${minX} ${minY} ${maxX-minX} ${maxY-minY}" preserveAspectRatio="xMidYMid meet" width="100%" height="100%">`;
    if(S.backgroundImage){const bg=safeUrl(S.backgroundImage);if(bg)html+=`<image href="${esc(bg)}" x="${minX}" y="${minY}" width="${maxX-minX}" height="${maxY-minY}" preserveAspectRatio="xMidYMid meet" opacity="${S.backgroundOpacity||0.35}"/>`}
    const sectors=S.sectors||[];
    for(const s of sectors){
      const c=esc(s.color||"#88a0b8");
      const dash=s.stroke==="dotted"?"2 3":s.stroke==="solid"?"":"6 4";
      html+=`<rect x="${s.x}" y="${s.y}" width="${s.width}" height="${s.height}" fill="${c}" fill-opacity="0.04" stroke="${c}" stroke-opacity="0.55" stroke-width="1"${dash?` stroke-dasharray="${dash}"`:``} rx="4"/><text x="${s.x+6}" y="${s.y+14}" font-size="11" font-family="Helvetica, Arial, sans-serif" font-weight="700" fill="${c}" opacity="0.85">${esc(s.name)}</text>`;
    }
    for(const c of Object.values(S.connections)){
      const a=live[c.from],b=live[c.to];if(!a||!b)continue;
      const pa=anchor(a),pb=anchor(b);
      const wps=c.waypoints||[];
      const pts=[pa,...wps,pb].map(p=>p.x+","+p.y).join(" ");
      const en=a.energized&&b.energized;
      const stk=c.color?esc(c.color):(en?'var(--energ)':'var(--line)');
      const sw=c.width||1.5;
      const dash=c.dash==="dashed"?' stroke-dasharray="6 4"':c.dash==="dotted"?' stroke-dasharray="2 3"':'';
      html+=`<polyline points="${pts}" fill="none" stroke="${stk}" stroke-width="${sw}"${dash}/>`;
    }
    const sortedEqs=eqs.slice().sort((a,b)=>((a.zIndex||0)-(b.zIndex||0)));
    for(const e of sortedEqs){
      const alerting=S.alarms.some(a=>a.equipmentId===e.id&&!a.ack);
      const halo=alerting?`<rect class="blink-attn" x="-14" y="-16" width="28" height="32" fill="none" stroke="#20ff20" stroke-width="2" rx="2" pointer-events="none"/>`:"";
      const badge86=e.blocked?`<g transform="translate(18,-14)" style="cursor:pointer" onclick="unblock86(event,'${esc(e.id)}')"><title>Bloqueio 86 ativo — clique para rearmar</title><circle r="8" fill="#c00000" stroke="#ffffff" stroke-width="1.2"/><text text-anchor="middle" y="3" font-size="8.5" font-weight="700" fill="#ffffff" font-family="Helvetica, Arial, sans-serif">86</text></g>`:"";
      html+=`<g transform="translate(${e.x},${e.y}) rotate(${e.rotation||0})" style="cursor:pointer" onclick="openMenu(event,'${esc(e.id)}')">${halo}${sym(e,live[e.id])}${badge86}</g>`;
    }

    html+="</svg>";
    document.getElementById("svg").outerHTML=html;
    document.querySelector(".diagram svg").id="svg";

    document.getElementById("acount").textContent=S.alarms.filter(a=>!a.ack).length+" pend.";
    document.getElementById("alarms").innerHTML=S.alarms.slice(0,200).map(a=>`<div class="row ${a.priority==="EMERGENCY"&&!a.ack?"blink":""}" style="background:${a.ack?"transparent":"rgba(255,255,255,.04)"}">
      <span style="color:var(--muted);width:60px">${new Date(a.ts).toLocaleTimeString()}</span>
      <span class="pill" style="background:${COLORS[a.priority]}">${esc(PLABEL[a.priority]||a.priority)}</span>
      <span style="width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(a.source)}</span>
      <span style="flex:1">${esc(a.message)}</span>
      ${a.ack?"":`<button onclick="ack('${esc(a.id)}')" style="background:var(--panel2);color:var(--fg);border:1px solid var(--border);font-size:10px;cursor:pointer;font-family:inherit">REC</button>`}
    </div>`).join("");

    // Som contínuo enquanto houver EMERGÊNCIA não reconhecida
    updateEmergencySound();

    document.getElementById("events").innerHTML=S.events.slice(0,200).map(e=>`<div class="row"><span style="color:var(--muted);width:60px">${new Date(e.ts).toLocaleTimeString()}</span><span style="width:60px;color:var(--energ)">${esc(e.user||"op")}</span><span style="flex:1">${esc(e.action)}</span></div>`).join("");

    document.getElementById("prot").innerHTML=(S.protections||[]).map(p=>`<button onclick="trigger('${esc(p.id)}')" style="background:var(--panel2);color:var(--fg);border:1px solid var(--border);border-radius:3px;padding:4px;font-family:inherit;font-size:10px;cursor:pointer" title="${esc(p.label)} (${p.actions.length} ações)">${esc(p.code)}</button>`).join("");

    // sequence box
    const sb=document.getElementById("seqbox");
    if(S.sequenceActive&&S.expectedSequence&&S.expectedSequence.length){
      const cur=S.expectedSequence[S.sequenceCursor];
      sb.style.display="block";
      sb.innerHTML=`<div style="color:var(--muted);font-size:10px">SEQUÊNCIA ${S.sequenceCursor}/${S.expectedSequence.length}</div>${cur?`<div style="color:var(--energ);font-weight:bold">→ ${esc(cur.action)} ${esc(S.equipment[cur.equipmentId]?.name||"?")}</div>`:`<div style="color:var(--open);font-weight:bold">✓ concluída</div>`}`;
    } else sb.style.display="none";

    // sector picker
    const zs=document.getElementById("zsec");
    if(zs){
      const opts=(S.sectors||[]).map(s=>`<option value="${esc(s.id)}">${esc(s.name)}</option>`).join("");
      zs.innerHTML=(S.sectors&&S.sectors.length)?`<select id="zsecSel"><option value="">— Setor —</option>${opts}</select><button onclick="fitSector()">Ir</button>`:"";
    }
    bindPan();
  }

  function bindPan(){
    const svg=document.getElementById("svg");if(!svg)return;
    let dragging=false,sx=0,sy=0,vb0=null;
    svg.addEventListener("mousedown",(e)=>{if(e.target!==svg&&e.target.closest("g[onclick]"))return;dragging=true;sx=e.clientX;sy=e.clientY;vb0=VB||autoBounds();svg.classList.add("dragging")});
    window.addEventListener("mouseup",()=>{dragging=false;const s=document.getElementById("svg");if(s)s.classList.remove("dragging")});
    window.addEventListener("mousemove",(e)=>{if(!dragging)return;const r=svg.getBoundingClientRect();const sxr=vb0.w/r.width,syr=vb0.h/r.height;VB={x:vb0.x-(e.clientX-sx)*sxr,y:vb0.y-(e.clientY-sy)*syr,w:vb0.w,h:vb0.h};svg.setAttribute("viewBox",`${VB.x} ${VB.y} ${VB.w} ${VB.h}`)});
    svg.addEventListener("wheel",(e)=>{e.preventDefault();const f=e.deltaY>0?1.15:0.87;const r=svg.getBoundingClientRect();const cur=VB||autoBounds();const mx=cur.x+(e.clientX-r.left)/r.width*cur.w,my=cur.y+(e.clientY-r.top)/r.height*cur.h;VB={x:mx-(mx-cur.x)*f,y:my-(my-cur.y)*f,w:cur.w*f,h:cur.h*f};svg.setAttribute("viewBox",`${VB.x} ${VB.y} ${VB.w} ${VB.h}`)},{passive:false});
  }

  window.zoom=function(f){const cur=VB||autoBounds();const cx=cur.x+cur.w/2,cy=cur.y+cur.h/2;VB={x:cx-cur.w*f/2,y:cy-cur.h*f/2,w:cur.w*f,h:cur.h*f};render()};
  window.zoomReset=function(){VB=null;render()};
  window.fitSector=function(){const sel=document.getElementById("zsecSel");if(!sel)return;const s=(S.sectors||[]).find(x=>x.id===sel.value);if(!s)return;const pad=20;VB={x:s.x-pad,y:s.y-pad,w:s.width+pad*2,h:s.height+pad*2};render()};

  function uid(){return Math.random().toString(36).slice(2,10)}
  function logEvent(action,equipment,user){S.events.unshift({id:uid(),ts:Date.now(),user:user||"operador",equipment,action,result:"ok"});if(S.events.length>500)S.events.pop()}
  function logAlarm(priority,source,message,equipmentId){S.alarms.unshift({id:uid(),ts:Date.now(),priority,source,message,ack:false,equipmentId});if(S.alarms.length>500)S.alarms.pop()}

  // ===== Som de alarme p/ EMERGÊNCIA não reconhecida =====
  let _audio=null;
  function startSound(){
    if(_audio)return;
    try{
      const Ctx=window.AudioContext||window.webkitAudioContext;
      const ctx=new Ctx();
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.type="square";osc.frequency.value=880;gain.gain.value=0.06;
      osc.connect(gain).connect(ctx.destination);osc.start();
      const iv=setInterval(()=>{osc.frequency.value=osc.frequency.value===880?540:880},450);
      _audio={ctx,osc,iv};
    }catch(_){}
  }
  function stopSound(){if(!_audio)return;try{clearInterval(_audio.iv);_audio.osc.stop();_audio.ctx.close()}catch(_){}_audio=null}
  function updateEmergencySound(){
    const need=S.alarms.some(a=>a.priority==="EMERGENCY"&&!a.ack);
    if(need)startSound();else stopSound();
  }
  // navegadores exigem interação para tocar áudio
  document.addEventListener("click",function once(){document.removeEventListener("click",once);updateEmergencySound()},{once:true});

  // ===== Avaliador de condições =====
  function evalConditions(){
    for(const c of S.conditions||[]){
      if(!c.items||!c.items.length)continue;
      const allMatch=c.items.every(it=>{const eq=S.equipment[it.equipmentId];return eq&&eq.state===it.expected});
      if(allMatch&&!c.lastTriggeredAt){c.lastTriggeredAt=Date.now();logAlarm(c.priority,"CONDIÇÃO",c.label)}
      else if(!allMatch&&c.lastTriggeredAt){c.lastTriggeredAt=0}
    }
  }

  window.openMenu=function(ev,id){
    ev.stopPropagation();
    document.querySelectorAll(".menu").forEach(m=>m.remove());
    const e=S.equipment[id];if(!e)return;
    const m=document.createElement("div");m.className="menu";m.style.left=ev.clientX+"px";m.style.top=ev.clientY+"px";
    m.innerHTML=`<div class="title">${esc(e.name)} · ${e.state}${e.blocked?" · BLOQ":""}</div>
      <button onclick="op('${esc(id)}','CLOSE')">FECHAR</button>
      <button onclick="op('${esc(id)}','OPEN')">ABRIR</button>
      <button onclick="op('${esc(id)}','BLOCK')">BLOQUEAR</button>
      <button onclick="op('${esc(id)}','UNBLOCK')">DESBLOQUEAR</button>
      <button onclick="op('${esc(id)}','GROUND')">ATERRAR</button>
      <button onclick="op('${esc(id)}','UNGROUND')">RETIRAR TERRA</button>`;
    document.body.appendChild(m);
    setTimeout(()=>document.addEventListener("click",closeMenu,{once:true}),0);
  };
  function closeMenu(){document.querySelectorAll(".menu").forEach(m=>m.remove())}

  window.op=function(id,action){
    const e=S.equipment[id];if(!e)return;
    const live=compute();
    if(action==="CLOSE"&&e.blocked){logAlarm("CRITICAL",e.name,"Tentativa de fechar BLOQUEADO");render();return}
    if(action==="GROUND"&&live[id].energized){logAlarm("EMERGENCY",e.name,"INTERTRAVAMENTO: aterrar energizado");render();return}
    // sequence check
    if(S.sequenceActive&&S.expectedSequence&&S.expectedSequence.length){
      const exp=S.expectedSequence[S.sequenceCursor];
      if(!exp||exp.equipmentId!==id||exp.action!==action){
        const expName=exp?S.equipment[exp.equipmentId]?.name||exp.equipmentId:"—";
        logAlarm("CRITICAL","AVALIADOR","FORA DA SEQUÊNCIA: esperado "+(exp?exp.action:"—")+" "+expName+", executado "+action+" "+e.name);
        logEvent("FALHA: "+action+" "+e.name+" fora da sequência",id,"avaliador");
        closeMenu();render();return;
      }
      S.sequenceCursor++;
    }
    const map={OPEN:"abriu",CLOSE:"fechou",GROUND:"aterrou",UNGROUND:"retirou terra de",BLOCK:"bloqueou",UNBLOCK:"desbloqueou"};
    if(action==="OPEN")e.state="OPEN";if(action==="CLOSE")e.state="CLOSED";if(action==="GROUND")e.state="GROUNDED";if(action==="UNGROUND")e.state="OPEN";if(action==="BLOCK")e.blocked=true;if(action==="UNBLOCK")e.blocked=false;
    logEvent("operador "+map[action]+" "+e.name,id);
    if(action==="OPEN"&&e.type==="breaker"){logAlarm("WARNING",e.name,"Disjuntor "+e.name+" ABERTO",id)}
    evalConditions();
    closeMenu();render();
  };
  window.ack=function(id){const a=S.alarms.find(x=>x.id===id);if(a){a.ack=true;render()}};
  window.unblock86=function(ev,id){ev.stopPropagation();const e=S.equipment[id];if(!e)return;if(confirm("Rearmar bloqueio 86 do equipamento "+e.name+"?")){e.blocked=false;logEvent("UNBLOCK 86 "+e.name);render()}};
  window.ackAll=function(){S.alarms.forEach(a=>a.ack=true);render()};
  window.resetSim=function(){if(confirm("Recarregar estado original?"))location.reload()};
  window.trigger=function(protId){
    const p=(S.protections||[]).find(x=>x.id===protId);if(!p)return;
    logAlarm(p.priority,"SIST",p.code+" "+p.label+" atuou");
    logEvent("Proteção "+p.code+" atuou",null,"proteção");
    for(const act of p.actions||[]){
      const t=S.equipment[act.equipmentId];if(!t)continue;
      if(act.action==="OPEN")t.state="OPEN";
      else if(act.action==="CLOSE")t.state="CLOSED";
      else if(act.action==="BLOCK")t.blocked=true;
      else if(act.action==="UNBLOCK")t.blocked=false;
      else if(act.action==="GROUND")t.state="GROUNDED";
      logEvent(act.action+" "+t.name+" por "+p.code,t.id,"proteção");
      // borda piscante até reconhecimento
      if(act.action==="OPEN"&&t.type==="breaker"){logAlarm(p.priority,t.name,"Disjuntor "+t.name+" ABERTO por "+p.code,t.id)}
    }
    evalConditions();
    render();
  };
  window.downloadJSON=function(){
    const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=(S.substationName||"subestacao")+".json";a.click();
  };

  render();
})();
</script>
</body>
